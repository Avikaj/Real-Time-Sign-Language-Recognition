<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Sign Language Recognition</title>
    <style>
        body {
            margin: 0;
            font-family:cursive;
            color: rgb(1, 1, 1);
        }

        /* Header Styling */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
           background-color: #d1b0b9; /* Added background for visibility */
        }

        header .name {
            font-size: 24px;
            font-weight: bold;
            color: #0a0a0a;
        }

        /* Navigation Menu */
        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: black; /* Fixed invisible text issue */
            text-decoration:none;
            font-size: 16px;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background 0.3s ease-in-out;
        }

        nav a:hover {
            background: #ddd; /* Added hover effect "SHADOW*/
        }

        /* Main Content */
        .ASL {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            background-color:#d1b0b9;
            background-size: auto;
            background-position: center;
            min-height: 300px;
        }

        .ASL h1 {
            font-size: 40px;
            margin-bottom: 20px;
            color: #000000;
        }

        .ASL img {
            width: 300px;
            height: auto;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }
        .ASL-content {
            position: relative;
            z-index: 2;
        }

        .ASL h1 {
            font-size: 60px;
            margin: 0;
        }

        .ASL p {
            font-size: 18px;
            margin: 20px 0;
        }

        .ASL .button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #e3e3e3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .ASL .button:hover {
            background-color: #f1f1f1;
        }
 /* Details Boxes */
        .details-boxes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px auto;
            padding: 20px;
            max-width: 90%;
        }

        .details-box-link {
            text-decoration: none;
            display: block; /* Ensures full clickable area */
        }

        .details-box {
            background-color: #ffffff;
            border: 2px solid #5f3397;
            border-radius: 10px;
            padding: 20px;
            width: 320px; /* Fixed width */
            min-height: 200px; /* Ensures equal height */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease-in-out;
        }

        .details-box:hover {
            transform: scale(1.05);
            background-color: #f0f0f0; /* Light background on hover */
        }

        .details-box h2 {
            color: #5f3397;
            margin-bottom: 10px;
        }

        .details-box p {
            font-size: 16px;
            color: #333;
            line-height: 1.5;
        }

        
    </style>
</head>

   <header>

</header>
